<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Grid Layout</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f4f9;
        }

        .grid-container {
            display: grid;
            min-height: 100vh;
            grid-template-columns: 200px 1fr 200px;
            grid-template-rows: auto 1fr auto;
            grid-template-areas:
                "header header header"
                "nav main aside"
                "footer footer footer";
        }

        header {
            grid-area: header;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            grid-area: nav;
            background-color: #34495e;
            color: #ecf0f1;
            padding: 20px;
        }

        main {
            grid-area: main;
            background-color: #ffffff;
            padding: 20px;
        }

        aside {
            grid-area: aside;
            background-color: #bdc3c7;
            padding: 20px;
        }

        footer {
            grid-area: footer;
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr auto auto;
                grid-template-areas:
                    "header"
                    "nav"
                    "main"
                    "aside"
                    "footer";
            }
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <header>
            <h2>Header</h2>
        </header>
        <nav>
            <h3>Navigation</h3>
            <p>Links</p>
        </nav>
        <main>
            <h3>Main Content</h3>
            <p>Primary content area.</p>
        </main>
        <aside>
            <h3>Sidebar</h3>
            <p>Ads / Extra</p>
        </aside>
        <footer>
            <p>Footer Content</p>
        </footer>
    </div>
</body>
</html>

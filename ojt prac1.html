<!DOCTYPE html>
<html>
<head>
    <title>Nested List Example</title>
</head>
<body>

    <h2>Nested List using Ordered and Unordered List</h2>

    <ol>
        <li>Fruits
            <ul>
                <li>Apple</li>
                <li>Banana</li>
                <li>Mango</li>
            </ul>
        </li>

        <li>Vegetables
            <ul>
                <li>Potato</li>
                <li>Tomato</li>
                <li>Onion</li>
            </ul>
        </li>

        <li>Drinks
            <ul>
                <li>Tea</li>
                <li>Coffee</li>
                <li>Juice</li>
            </ul>
        </li>
    </ol>

</body>
</html>

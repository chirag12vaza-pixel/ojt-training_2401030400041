<style>

    background-color: #fcfcfc;
}


header {
    background-color: #1a1a1a;
    color: white;
    padding-bottom: 50px; 
}


nav {
    display: flex;
    align-items: center;
    padding: 15px 30px;
    gap: 25px;
}

nav a {
    color: white;
    text-decoration: none;
    transition: color 0.2s ease;
}

nav .logo {
    margin-right: auto; 
    display: flex;
    align-items: center;
}

nav .logo img {
    height: 50px; 
    filter: invert(1); 
}

nav a:not(.logo):hover {
    color: gold;
}


.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-size: 48px;
    margin: 0 0 10px 0;
    color: gold;
}

.hero p {
    font-size: 18px;
    margin: 0;
    color: #cccccc;
}
</style>
</head>
<body>

<header>
    <nav>
        <a href="#" class="logo">
            <img src="C:\Users\Chirag\Downloads\music instru.png" alt="Musica Logo">
        </a>
        <a href="#">Guitars</a>
        <a href="#">Keyboards</a>
        <a href="#">Drums</a>
        <a href="#">Strings</a>
        <a href="#">Contact</a>
    </nav>

        <h1>Welcome to Musica</h1>
        <p>Find the perfect instrument to match your passion.</p>
    </div>
</header>

</html>
